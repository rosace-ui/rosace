@keyframes spr{to{transform:rotate(-45deg)}}
@keyframes pu{0%,100%{filter:drop-shadow(0 0 3px rgba(122,123,255,.25))}50%{filter:drop-shadow(0 0 9px rgba(122,123,255,.6)) drop-shadow(0 0 18px rgba(0,207,255,.25))}}</style>

<style>
.petal,.inner-petal{transform-box:fill-box;transform-origin:center 89px;opacity:0;animation:pi .8s cubic-bezier(.2,.9,.25,1.2) forwards}
.inner-petal{transform-origin:center 55px;animation:ii .7s cubic-bezier(.2,.9,.3,1.15) forwards}
.core{transform-box:fill-box;transform-origin:center center;opacity:0;animation:ci .6s cubic-bezier(.3,1.4,.4,1) .78s forwards}
@keyframes pi{from{opacity:0;transform:scale(.2) rotate(-28deg)}60%{opacity:1}to{opacity:1;transform:none}}
@keyframes ii{from{opacity:0;transform:scale(.1)}to{opacity:1;transform:none}}
@keyframes ci{from{opacity:0;transform:scale(0)}to{opacity:1;transform:none}}</style>

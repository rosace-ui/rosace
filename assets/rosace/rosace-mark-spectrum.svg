<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1024" height="1024" viewBox="-115 -115 230 230">
  <defs>
    <linearGradient id="s0" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#00EEFF"/><stop offset="1" stop-color="#0077cc"/></linearGradient>
    <linearGradient id="s1" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#4D7CFF"/><stop offset="1" stop-color="#2440a8"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#9D5CFF"/><stop offset="1" stop-color="#5a2bb0"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#FF4D9D"/><stop offset="1" stop-color="#b02468"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#FF6A4D"/><stop offset="1" stop-color="#c23a24"/></linearGradient>
    <linearGradient id="s5" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#FFC24D"/><stop offset="1" stop-color="#c78a1e"/></linearGradient>
    <linearGradient id="s6" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#7DFF6A"/><stop offset="1" stop-color="#2fa84d"/></linearGradient>
    <linearGradient id="s7" x1="0" y1="-1" x2="0" y2="0"><stop offset="0" stop-color="#00FFC8"/><stop offset="1" stop-color="#00a888"/></linearGradient>
    <filter id="glowm" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#ffffff" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7878ff" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- outer ring: 8 spectrum petals · tips r=89, waist r=55, inner r=21, half-width 21 -->
  <g filter="url(#glowm)">
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s0)"/>
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s1)" transform="rotate(45)"/>
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s2)" transform="rotate(90)"/>
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s3)" transform="rotate(135)"/>
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s4)" transform="rotate(180)"/>
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s5)" transform="rotate(225)"/>
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s6)" transform="rotate(270)"/>
    <polygon points="0,-89 21,-55 0,-21 -21,-55" fill="url(#s7)" transform="rotate(315)"/>
  </g>

  <!-- inner ring: 1/φ scale, offset 22.5° -->
  <g opacity="0.85">
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#00EEFF" opacity="0.5" transform="rotate(22.5)"/>
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#9D5CFF" opacity="0.5" transform="rotate(67.5)"/>
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#FF4D9D" opacity="0.5" transform="rotate(112.5)"/>
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#FF6A4D" opacity="0.5" transform="rotate(157.5)"/>
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#FFC24D" opacity="0.5" transform="rotate(202.5)"/>
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#7DFF6A" opacity="0.5" transform="rotate(247.5)"/>
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#00FFC8" opacity="0.5" transform="rotate(292.5)"/>
    <polygon points="0,-55 13,-34 0,-13 -13,-34" fill="#4D7CFF" opacity="0.5" transform="rotate(337.5)"/>
  </g>

  <!-- core -->
  <circle r="13" fill="#04070c" stroke="#ffffff" stroke-width="1.8" opacity="0.95" filter="url(#glowm)"/>
  <circle r="5" fill="#ffffff"/>
</svg>

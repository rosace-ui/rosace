# Android NDK cross-compile linker config (D106 Phase 24 Step 3).
#
# `cargo build --target aarch64-linux-android` needs a linker that knows how
# to produce Android-ABI binaries — the NDK ships clang wrappers pinned to a
# minimum API level (`aarch64-linux-android24-clang` = API 24 / Android 7.0,
# chosen as a modern-but-not-bleeding-edge minSdkVersion baseline) that do
# this. Path is this machine's NDK install; a real per-project setup would
# make this configurable (`ANDROID_NDK_HOME`-driven), tracked as follow-up
# once Step 3's Gradle-project generation makes it more visible where this
# needs to live per-app rather than just workspace-wide for verification.
[target.aarch64-linux-android]
linker = "/Users/godwinjoseph/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/aarch64-linux-android24-clang"

[target.armv7-linux-androideabi]
linker = "/Users/godwinjoseph/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/armv7a-linux-androideabi24-clang"

[target.x86_64-linux-android]
linker = "/Users/godwinjoseph/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/x86_64-linux-android24-clang"

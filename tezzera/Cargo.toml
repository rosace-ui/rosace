[package]
name = "tezzera"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "TEZZERA UI framework — single-crate SDK entry point"

# ── Dependency layer rules ────────────────────────────────────────────────────
#
# This crate sits at Layer 7 (top of the DAG). It re-exports everything but
# NOTHING in the framework may depend on this crate — only app code does.
#
# Layer 0  tezzera-trace      zero deps
# Layer 1  tezzera-state      → trace
# Layer 2  tezzera-core       → trace, state
# Layer 3  tezzera-layout     → core
# Layer 4  tezzera-render     → core, layout
#          tezzera-theme      → core, state, trace
# Layer 5  (services)         → layers 0-4 only
# Layer 6  tezzera-widgets    → layers 0-5
# Layer 7  tezzera (this)     → everything
#
# Rule: a crate at layer N may only depend on crates at layers < N.
# Enforced by keeping this list here and never adding tezzera as a dep
# inside any sub-crate.

[dependencies]
# Core layers
tezzera-trace   = { path = "../tezzera-trace" }
tezzera-state   = { path = "../tezzera-state" }
tezzera-core    = { path = "../tezzera-core" }
tezzera-layout  = { path = "../tezzera-layout" }
tezzera-render  = { path = "../tezzera-render" }
tezzera-theme   = { path = "../tezzera-theme" }

# Widget layer
tezzera-widgets = { path = "../tezzera-widgets" }

# Service layer
tezzera-animate  = { path = "../tezzera-animate" }
tezzera-anim     = { path = "../tezzera-anim" }
tezzera-scroll   = { path = "../tezzera-scroll" }
tezzera-nav      = { path = "../tezzera-nav" }
tezzera-nav-anim = { path = "../tezzera-nav-anim" }
tezzera-forms    = { path = "../tezzera-forms" }
tezzera-gesture  = { path = "../tezzera-gesture" }
tezzera-a11y     = { path = "../tezzera-a11y" }
tezzera-text     = { path = "../tezzera-text" }
tezzera-shaping  = { path = "../tezzera-shaping" }
tezzera-style    = { path = "../tezzera-style" }
tezzera-i18n     = { path = "../tezzera-i18n" }
tezzera-net      = { path = "../tezzera-net" }
tezzera-ws       = { path = "../tezzera-ws" }
tezzera-clipboard = { path = "../tezzera-clipboard" }
tezzera-platform  = { path = "../tezzera-platform" }
tezzera-bidi      = { path = "../tezzera-bidi" }
tezzera-ime       = { path = "../tezzera-ime" }
tezzera-media     = { path = "../tezzera-media" }
tezzera-macros    = { path = "../tezzera-macros" }
tezzera-hot-reload = { path = "../tezzera-hot-reload" }
tezzera-devtools   = { path = "../tezzera-devtools" }
tezzera-test-utils = { path = "../tezzera-test-utils" }

# Web-only (D107/Phase 25 Step 4) — the runtime shadow-DOM fallback that
# syncs SemanticNode -> live DOM after hydration. This is the FIRST
# target-gated dependency in this crate; every other one above is
# unconditional (a known gap — see [[project-cli-platforms]] memory /
# CRATE_CONTRACTS.md). Gated to wasm32 specifically so this never compiles
# into iOS/Android/macOS/Windows/Linux builds — not "probably stripped by
# the linker," genuinely never part of that target's dependency graph at
# all. tzr-cli (Step 3's build-time consumer) depends on tezzera-web-seo
# directly in its own Cargo.toml instead — it's a dev-machine tool, never
# shipped inside any app binary regardless of the app's target platform.
[target.'cfg(target_arch = "wasm32")'.dependencies]
tezzera-web-seo = { path = "../tezzera-web-seo" }

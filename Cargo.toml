[workspace]
members = [
    "tezzera-macros",
    "tezzera-trace",
    "tezzera-core",
    "tezzera-state",
    "tezzera-layout",
    "tezzera-render",
    "tezzera-theme",
    "tezzera-widgets",
    "tezzera-cli",
    "tezzera-examples",
    "tezzera-platform",
    "tezzera-animate",
    "tezzera-scroll",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["TEZZERA Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/tezzera-ui/tezzera"
